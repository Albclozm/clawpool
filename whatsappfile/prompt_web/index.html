<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prompt 编辑器</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;padding:20px;max-width:900px;margin:auto}
    textarea{width:100%;min-height:280px;font-size:15px;line-height:1.5;padding:12px}
    button{padding:10px 16px;font-size:15px;cursor:pointer}
    .row{display:flex;gap:10px;align-items:center;margin:12px 0}
    .ok{color:#0a7f2e}.muted{color:#666}
  </style>
</head>
<body>
  <h2>ZTURBO 提示词文档</h2>
  <div class="muted">这里保存的内容会写入 <code>prompt.txt</code></div>
  <div class="row">
    <button id="load">读取</button>
    <button id="save">保存</button>
    <span id="status" class="muted"></span>
  </div>
  <textarea id="prompt" placeholder="在这里输入你的默认提示词..."></textarea>

  <script>
    const $ = (id)=>document.getElementById(id);
    async function load(){
      const r = await fetch('/api/prompt');
      const j = await r.json();
      $('prompt').value = j.prompt || '';
      $('status').textContent = '已读取';
      $('status').className = 'ok';
    }
    async function save(){
      const prompt = $('prompt').value;
      const r = await fetch('/api/prompt', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({prompt})
      });
      const j = await r.json();
      $('status').textContent = j.ok ? '已保存' : ('保存失败: '+(j.error||''));
      $('status').className = j.ok ? 'ok' : '';
    }
    $('load').onclick = load;
    $('save').onclick = save;
    load();
  </script>
</body>
</html>
